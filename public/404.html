<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0c0c" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 — Danilo Moura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --color-surface-dark: #0c0c0c;
        --color-text-primary: #ffffff;
        --color-text-secondary: #a3a3a3;
        --color-border: rgba(255, 255, 255, 0.12);
        --color-accent: #6b1f1a;
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-serif: "Instrument Serif", Georgia, serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background-color: var(--color-surface-dark);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .frame {
        max-width: 32rem;
        width: 100%;
      }
      .eyebrow {
        font-family: var(--font-sans);
        font-size: 0.6875rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--color-text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 2.5rem;
      }
      .dot {
        width: 6px;
        height: 6px;
        background-color: var(--color-accent);
        border-radius: 9999px;
        display: inline-block;
      }
      .code {
        font-family: var(--font-serif);
        font-weight: 400;
        font-size: clamp(7rem, 26vw, 14rem);
        line-height: 0.85;
        letter-spacing: 0.01em;
        margin: 0;
      }
      .message {
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
        line-height: 1.6;
        letter-spacing: -0.01em;
        margin: 1.75rem 0 2.75rem;
      }
      .actions {
        display: inline-flex;
        align-items: center;
        gap: 1.25rem;
      }
      a.primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0 1.25rem;
        background-color: var(--color-text-primary);
        color: var(--color-surface-dark);
        font-size: 0.8125rem;
        font-weight: 400;
        letter-spacing: -0.01em;
        text-decoration: none;
        transition: opacity 0.2s ease;
      }
      a.primary:hover { opacity: 0.88; }
      a.quiet {
        font-size: 0.8125rem;
        color: var(--color-text-secondary);
        text-decoration: none;
        position: relative;
        transition: color 0.2s ease;
      }
      a.quiet::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -2px;
        height: 1px;
        background-color: currentColor;
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 0.25s ease;
      }
      a.quiet:hover { color: var(--color-text-primary); }
      a.quiet:hover::after { transform: scaleX(1); }
      footer {
        margin-top: 5rem;
        font-size: 0.6875rem;
        color: var(--color-text-secondary);
        letter-spacing: 0.02em;
      }
      footer a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      footer a:hover { color: var(--color-text-primary); }
      @media (prefers-reduced-motion: no-preference) {
        .code { animation: settle 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes settle {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="eyebrow">
        <span class="dot" aria-hidden></span>
        Erro · Cliente
      </div>
      <p class="code">404</p>
      <p class="message">
        A página que você procura não existe, foi movida ou nunca esteve aqui.
      </p>
      <div class="actions">
        <a class="primary" href="/">Voltar ao início</a>
        <a class="quiet" href="mailto:me@danilomoura.dev.br">Reportar um problema</a>
      </div>
    </div>
    <footer>
      © 2026 Danilo Moura · <a href="/">danilomoura.dev.br</a>
    </footer>
  </body>
</html>
